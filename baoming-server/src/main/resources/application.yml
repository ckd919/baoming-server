server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: baoming-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/mydb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Aled2239}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      idle-timeout: 30000
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${APP_JWT_SECRET:baoming-jwt-secret-key-2024-min-32chars}
    expiration-days: ${APP_JWT_EXPIRATION_DAYS:7}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,https://ledbell.cn,http://ledbell.cn,https://8.134.252.128,http://8.134.252.128}
  wechat:
    appid: wxa0606d69df5b21f0
    secret: 4c3c58b0321b0ac44e75b84b415408bc
    pay:
      merchant-id: ${APP_WECHAT_PAY_MERCHANT_ID:}
      api-key: ${APP_WECHAT_PAY_API_KEY:}
      mch-serial: ${APP_WECHAT_PAY_MCH_SERIAL:}
      notify-url: https://ledbell.cn/api/payments/notify

logging:
  level:
    com.xiaozongxiong.baoming: ${LOG_LEVEL:DEBUG}
