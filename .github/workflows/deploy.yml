name: Deploy baoming-server

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # 阶段 1：构建
  # ============================================================
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: baoming-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: baoming-server-jar
          path: baoming-server/target/*.jar

  # ============================================================
  # 阶段 2：部署到服务器（仅 main 分支）
  # ============================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: baoming-server-jar
          path: target/

      - name: Rename JAR to app.jar
        run: |
          mv target/*.jar target/app.jar
          echo "JAR file: $(ls -lh target/app.jar)"

      # ---------- 上传 JAR 到服务器 ----------
      - name: Upload JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "target/app.jar"
          target: "/opt/baoming-server/"
          strip_components: 1

      # ---------- 写入环境变量 ----------
      - name: Write environment file on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cat > /opt/baoming-server/.env << 'ENV_EOF'
            SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            APP_JWT_SECRET=${{ secrets.JWT_SECRET }}
            APP_CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ORIGINS }}
            APP_WECHAT_APPID=${{ secrets.WECHAT_APPID }}
            APP_WECHAT_SECRET=${{ secrets.WECHAT_SECRET }}
            ENV_EOF
            chmod 600 /opt/baoming-server/.env

      # ---------- 数据库迁移 ----------
      - name: Run database migration
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== Running database migration ==="
            # 从环境变量读取数据库连接信息
            source /opt/baoming-server/.env

            # 迁移 SQL（幂等操作，可重复执行）
            psql "$SPRING_DATASOURCE_URL" << 'SQL_EOF'
            -- V1: 角色权限分离
            ALTER TABLE users ADD COLUMN IF NOT EXISTS role VARCHAR(10) DEFAULT 'USER';
            UPDATE users SET role = 'ADMIN' WHERE phone = '13310843925' AND (role IS NULL OR role = 'USER');
            ALTER TABLE users ALTER COLUMN role SET DEFAULT 'USER';
            ALTER TABLE users ALTER COLUMN role SET NOT NULL;
            ALTER TABLE users ALTER COLUMN password DROP NOT NULL;
            ALTER TABLE submissions ADD COLUMN IF NOT EXISTS user_id INTEGER;
            ALTER TABLE submissions ADD COLUMN IF NOT EXISTS phone VARCHAR(11);
            CREATE INDEX IF NOT EXISTS idx_submissions_user_id ON submissions(user_id);
            CREATE INDEX IF NOT EXISTS idx_submissions_phone ON submissions(phone);
            CREATE INDEX IF NOT EXISTS idx_users_role ON users(role);

            -- V2: 管理员管理 + 分享权限 + 微信登录
            ALTER TABLE users ADD COLUMN IF NOT EXISTS openid VARCHAR(100);
            ALTER TABLE users ADD COLUMN IF NOT EXISTS avatar_url VARCHAR(500) DEFAULT '';
            ALTER TABLE users ALTER COLUMN phone DROP NOT NULL;
            CREATE INDEX IF NOT EXISTS idx_users_openid ON users(openid);
            ALTER TABLE activities ADD COLUMN IF NOT EXISTS share_level VARCHAR(20) DEFAULT 'all';
            UPDATE activities SET share_level = 'creator' WHERE allow_share = false AND share_level = 'all';
            CREATE TABLE IF NOT EXISTS activity_admins (
                id          SERIAL PRIMARY KEY,
                activity_id VARCHAR(20) NOT NULL REFERENCES activities(id) ON DELETE CASCADE,
                user_id     INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
                role        VARCHAR(20) DEFAULT 'admin',
                created_at  BIGINT NOT NULL DEFAULT 0,
                UNIQUE(activity_id, user_id)
            );
            CREATE INDEX IF NOT EXISTS idx_aa_activity ON activity_admins(activity_id);
            CREATE INDEX IF NOT EXISTS idx_aa_user ON activity_admins(user_id);

            -- V3: 群限制访问
            ALTER TABLE activities ADD COLUMN IF NOT EXISTS group_restricted BOOLEAN DEFAULT false;
            CREATE INDEX IF NOT EXISTS idx_activities_status ON activities(status);

            -- V4: 管理员邀请 token
            ALTER TABLE activities ADD COLUMN IF NOT EXISTS admin_invite_token VARCHAR(64);
            SQL_EOF

            echo "=== Migration completed ==="

      # ---------- 重启服务 ----------
      - name: Restart application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== Stopping old service ==="
            sudo systemctl stop baoming-server 2>/dev/null || true

            echo "=== Backup old JAR ==="
            if [ -f /opt/baoming-server/app.jar ]; then
              sudo cp /opt/baoming-server/app.jar /opt/baoming-server/app.jar.bak
              echo "Backup saved to app.jar.bak"
            fi

            echo "=== Starting service ==="
            sudo systemctl start baoming-server

            echo "=== Service status ==="
            sudo systemctl status baoming-server --no-pager --lines=20 || true

      # ---------- 健康检查 ----------
      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "=== Waiting for app to start (max 60s) ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "✅ App is healthy!"
                curl -s http://localhost:8080/api/health
                exit 0
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            echo "❌ Health check failed!"
            sudo journalctl -u baoming-server --no-pager -n 50
            exit 1
